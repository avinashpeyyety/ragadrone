<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Raga Drone</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <style>
    :root {
      --bg: #0a0b12;
      --panel: #12141f;
      --gold: #d4a853;
      --saffron: #e8a838;
      --text: #e8e6e3;
      --muted: #9a958c;
      --border: rgba(212, 168, 83, 0.25);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: radial-gradient(ellipse 120% 80% at 50% -20%, #1a1530 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1.25rem 3rem;
    }
    .wrap { max-width: 820px; margin: 0 auto; }
    h1 { font-size: 1.35rem; color: var(--gold); margin-bottom: 0.25rem; }
    .sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.5rem; }
    label { display: block; font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.35rem; }
    select, input[type="range"] { width: 100%; margin-bottom: 1rem; }
    .columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1rem;
      align-items: start;
    }
    .columns .panel { margin-bottom: 0; min-height: 100%; }
    .hidden { display: none !important; }
    @media (max-width: 680px) {
      .columns { grid-template-columns: 1fr; }
    }
    select {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.6rem 0.75rem;
      border-radius: 8px;
      font-size: 1rem;
    }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    .panel h2 {
      font-size: 0.75rem;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.75rem;
    }
    .check { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; }
    .check input { width: auto; margin: 0; }
    .check span { font-size: 0.9rem; color: var(--text); text-transform: none; letter-spacing: 0; }
    .btn {
      width: 100%;
      padding: 0.85rem;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      background: linear-gradient(135deg, var(--saffron), var(--gold));
      color: #1a1208;
    }
    .btn.stop { background: var(--panel); color: var(--gold); border: 1px solid var(--border); margin-top: 0.5rem; }
    .btn:disabled { opacity: 0.4; cursor: default; }
    .status { font-size: 0.85rem; color: var(--muted); margin-top: 1rem; text-align: center; }
    .status.on { color: var(--saffron); }
    .swaras, .taal-line { font-size: 0.8rem; color: var(--muted); margin-top: 0.5rem; line-height: 1.4; }
    .taal-line { font-family: ui-monospace, monospace; font-size: 0.72rem; word-break: break-word; }
  </style>
</head>
<body>
  <p>RESTORE_BASELINE_PLACEHOLDER</p>
</body>
</html>
