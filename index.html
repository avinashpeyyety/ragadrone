<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Raga Drone — POC</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <style>
    :root {
      --bg: #0a0b12;
      --panel: #12141f;
      --gold: #d4a853;
      --saffron: #e8a838;
      --text: #e8e6e3;
      --muted: #9a958c;
      --border: rgba(212, 168, 83, 0.25);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: radial-gradient(ellipse 120% 80% at 50% -20%, #1a1530 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1.25rem 3rem;
    }
    .wrap { max-width: 420px; margin: 0 auto; }
    h1 { font-size: 1.35rem; color: var(--gold); margin-bottom: 0.25rem; }
    .sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.5rem; }
    label { display: block; font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.35rem; }
    select, input[type="range"] { width: 100%; margin-bottom: 1rem; }
    select {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.6rem 0.75rem;
      border-radius: 8px;
      font-size: 1rem;
    }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    .btn {
      width: 100%;
      padding: 0.85rem;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      background: linear-gradient(135deg, var(--saffron), var(--gold));
      color: #1a1208;
    }
    .btn.stop { background: var(--panel); color: var(--gold); border: 1px solid var(--border); margin-top: 0.5rem; }
    .btn:disabled { opacity: 0.4; cursor: default; }
    .status { font-size: 0.85rem; color: var(--muted); margin-top: 1rem; text-align: center; }
    .status.on { color: var(--saffron); }
    .swaras { font-size: 0.8rem; color: var(--muted); margin-top: 0.5rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Raga Drone</h1>
    <p class="sub">POC — tanpura-style bed + scale-locked ambient loop</p>

    <div class="panel">
      <label for="raga">Raga</label>
      <select id="raga"></select>
      <p class="swaras" id="swara-line"></p>

      <div class="row">
        <div>
          <label for="root">Root (Sa)</label>
          <select id="root"></select>
        </div>
        <div>
          <label for="tempo">Pulse (BPM)</label>
          <select id="tempo">
            <option value="50">50</option>
            <option value="60" selected>60</option>
            <option value="72">72</option>
            <option value="90">90</option>
          </select>
        </div>
      </div>

      <label for="droneVol">Drone level</label>
      <input type="range" id="droneVol" min="0" max="100" value="55" />

      <label for="loopVol">Loop level</label>
      <input type="range" id="loopVol" min="0" max="100" value="35" />

      <label for="density">Loop density</label>
      <input type="range" id="density" min="1" max="5" value="3" />
    </div>

    <button class="btn" id="start">Start</button>
    <button class="btn stop" id="stop" disabled>Stop</button>
    <p class="status" id="status">Click Start (audio needs a tap/click)</p>
  </div>

  <script>
    // Semitone offsets from Sa (12-TET POC; not full shruti)
    const RAGAS = {
      yaman:   { name: "Yaman",   swaras: "S R G M♯ P D N", notes: [0, 2, 4, 6, 7, 9, 11], vadi: 6 },
      bhairav: { name: "Bhairav", swaras: "S r G m P d N",  notes: [0, 1, 4, 5, 7, 8, 11], vadi: 1 },
      malkauns:{ name: "Malkauns",swaras: "S g m d S",      notes: [0, 3, 5, 8],             vadi: 5 },
      kafi:    { name: "Kafi",    swaras: "S R g M P D n",  notes: [0, 2, 3, 5, 7, 9, 10], vadi: 9 },
      darbari: { name: "Darbari", swaras: "S r g m P d n",  notes: [0, 1, 3, 5, 7, 8, 10], vadi: 1 },
    };

    const ROOTS = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
    const NOTE_NAMES = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];

    let droneSynth = null;
    let loopSynth = null;
    let reverb = null;
    let droneGain = null;
    let loopGain = null;
    let loopInterval = null;
    let running = false;

    const ragaEl = document.getElementById("raga");
    const rootEl = document.getElementById("root");
    const swaraLine = document.getElementById("swara-line");
    const statusEl = document.getElementById("status");

    Object.entries(RAGAS).forEach(([id, r]) => {
      ragaEl.append(new Option(r.name, id));
    });
    ROOTS.forEach((n) => rootEl.append(new Option(n, n)));

    function rootMidi() {
      return 48 + ROOTS.indexOf(rootEl.value); // C3
    }

    function noteName(semitoneFromSa) {
      const m = rootMidi() + semitoneFromSa;
      const oct = Math.floor(m / 12) - 1;
      return NOTE_NAMES[m % 12] + oct;
    }

    function updateSwaraLine() {
      const r = RAGAS[ragaEl.value];
      swaraLine.textContent = r.swaras + " · ambient loop in scale";
    }
    ragaEl.onchange = updateSwaraLine;
    updateSwaraLine();

    function pickLoopNote() {
      const r = RAGAS[ragaEl.value];
      const notes = r.notes;
      const density = +document.getElementById("density").value;
      // Bias toward vadi / Sa
      const roll = Math.random();
      let sem;
      if (roll < 0.2) sem = 0;
      else if (roll < 0.35 && r.vadi != null) sem = r.vadi;
      else sem = notes[Math.floor(Math.random() * notes.length)];
      const octave = Math.random() < 0.25 ? 12 : 0;
      return noteName(sem + octave);
    }

    async function ensureAudio() {
      await Tone.start();
      if (reverb) return;
      reverb = new Tone.Reverb({ decay: 8, wet: 0.45 }).toDestination();
      droneGain = new Tone.Gain(0).connect(reverb);
      loopGain = new Tone.Gain(0).connect(reverb);

      droneSynth = new Tone.PolySynth(Tone.Synth, {
        oscillator: { type: "sine" },
        envelope: { attack: 2.5, decay: 0.2, sustain: 0.85, release: 3 },
      }).connect(droneGain);

      const filter = new Tone.Filter(900, "lowpass");
      loopSynth = new Tone.PolySynth(Tone.Synth, {
        oscillator: { type: "triangle" },
        envelope: { attack: 0.08, decay: 0.3, sustain: 0.15, release: 1.2 },
        volume: -10,
      });
      loopSynth.chain(filter, loopGain);
    }

    function startDrone() {
      const sa = noteName(0);
      const pa = noteName(7);
      const saLow = noteName(-12);
      droneSynth.releaseAll();
      droneSynth.triggerAttack([saLow, sa, pa], Tone.now());
    }

    function scheduleLoop() {
      clearInterval(loopInterval);
      const bpm = +document.getElementById("tempo").value;
      const density = +document.getElementById("density").value;
      const ms = (60 / bpm) * 1000 * (6 - density) * 0.5;
      loopInterval = setInterval(() => {
        if (!running) return;
        const n = pickLoopNote();
        loopSynth.triggerAttackRelease(n, "8n", Tone.now(), 0.35 + Math.random() * 0.25);
      }, Math.max(180, ms));
    }

    function setVolumes() {
      if (!droneGain) return;
      droneGain.gain.rampTo(+document.getElementById("droneVol").value / 100 * 0.45, 0.3);
      loopGain.gain.rampTo(+document.getElementById("loopVol").value / 100 * 0.5, 0.3);
    }

    ["droneVol", "loopVol", "density", "tempo"].forEach((id) => {
      document.getElementById(id).oninput = () => {
        setVolumes();
        if (running) scheduleLoop();
      };
    });

    document.getElementById("start").onclick = async () => {
      await ensureAudio();
      running = true;
      setVolumes();
      startDrone();
      scheduleLoop();
      document.getElementById("start").disabled = true;
      document.getElementById("stop").disabled = false;
      statusEl.textContent = "Playing — " + RAGAS[ragaEl.value].name + " in " + rootEl.value;
      statusEl.classList.add("on");
    };

    document.getElementById("stop").onclick = () => {
      running = false;
      clearInterval(loopInterval);
      if (droneSynth) droneSynth.releaseAll();
      if (loopSynth) loopSynth.releaseAll();
      document.getElementById("start").disabled = false;
      document.getElementById("stop").disabled = true;
      statusEl.textContent = "Stopped";
      statusEl.classList.remove("on");
    };

    ragaEl.onchange = () => {
      updateSwaraLine();
      if (running) {
        startDrone();
      }
    };
    rootEl.onchange = () => { if (running) startDrone(); };
  </script>
</body>
</html>
