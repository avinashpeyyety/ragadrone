<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Raga Drone — POC</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <style>
    :root {
      --bg: #0a0b12;
      --panel: #12141f;
      --gold: #d4a853;
      --saffron: #e8a838;
      --text: #e8e6e3;
      --muted: #9a958c;
      --border: rgba(212, 168, 83, 0.25);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: radial-gradient(ellipse 120% 80% at 50% -20%, #1a1530 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1.25rem 3rem;
    }
    .wrap { max-width: 420px; margin: 0 auto; }
    h1 { font-size: 1.35rem; color: var(--gold); margin-bottom: 0.25rem; }
    .sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.5rem; }
    label { display: block; font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.35rem; }
    select, input[type="range"] { width: 100%; margin-bottom: 1rem; }
    select {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.6rem 0.75rem;
      border-radius: 8px;
      font-size: 1rem;
    }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    .panel h2 {
      font-size: 0.75rem;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.75rem;
    }
    .check { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; }
    .check input { width: auto; margin: 0; }
    .check span { font-size: 0.9rem; color: var(--text); text-transform: none; letter-spacing: 0; }
    .btn {
      width: 100%;
      padding: 0.85rem;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      background: linear-gradient(135deg, var(--saffron), var(--gold));
      color: #1a1208;
    }
    .btn.stop { background: var(--panel); color: var(--gold); border: 1px solid var(--border); margin-top: 0.5rem; }
    .btn:disabled { opacity: 0.4; cursor: default; }
    .status { font-size: 0.85rem; color: var(--muted); margin-top: 1rem; text-align: center; }
    .status.on { color: var(--saffron); }
    .swaras, .taal-line { font-size: 0.8rem; color: var(--muted); margin-top: 0.5rem; line-height: 1.4; }
    .taal-line { font-family: ui-monospace, monospace; font-size: 0.72rem; word-break: break-word; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Raga Drone</h1>
    <p class="sub">POC — harmonium-style drone, scale loop, tabla taal</p>

    <div class="panel">
      <h2>Raga · Drone</h2>
      <label class="check">
        <input type="checkbox" id="ragaOn" checked />
        <span>Raga on (drone + loop)</span>
      </label>
      <label for="raga">Raga</label>
      <select id="raga"></select>
      <p class="swaras" id="swara-line"></p>

      <div class="row">
        <div>
          <label for="root">Root (Sa)</label>
          <select id="root"></select>
        </div>
        <div>
          <label for="tempo">Tempo (BPM)</label>
          <select id="tempo">
            <option value="50">50</option>
            <option value="60" selected>60</option>
            <option value="72">72</option>
            <option value="90">90</option>
            <option value="110">110</option>
          </select>
        </div>
      </div>

      <label for="droneVol">Drone level</label>
      <input type="range" id="droneVol" min="0" max="100" value="55" />

      <label for="loopVol">Loop level</label>
      <input type="range" id="loopVol" min="0" max="100" value="30" />

      <label for="density">Loop density</label>
      <input type="range" id="density" min="1" max="5" value="3" />
    </div>

    <div class="panel">
      <h2>Tabla · Taal</h2>
      <label class="check">
        <input type="checkbox" id="tablaOn" checked />
        <span>Tabla on</span>
      </label>
      <label for="taal">Taal</label>
      <select id="taal"></select>
      <p class="taal-line" id="taal-line"></p>
      <label for="tablaVol">Tabla level</label>
      <input type="range" id="tablaVol" min="0" max="100" value="70" />
    </div>

    <button class="btn" id="start">Start</button>
    <button class="btn stop" id="stop" disabled>Stop</button>
    <p class="status" id="status">Click Start (audio needs a tap/click)</p>
  </div>

  <script>
    const RAGAS = {
      yaman:   { name: "Yaman",   swaras: "S R G M♯ P D N", notes: [0, 2, 4, 6, 7, 9, 11], vadi: 6 },
      bhairav: { name: "Bhairav", swaras: "S r G m P d N",  notes: [0, 1, 4, 5, 7, 8, 11], vadi: 1 },
      malkauns:{ name: "Malkauns",swaras: "S g m d S",      notes: [0, 3, 5, 8],             vadi: 5 },
      kafi:    { name: "Kafi",    swaras: "S R g M P D n",  notes: [0, 2, 3, 5, 7, 9, 10], vadi: 9 },
      darbari: { name: "Darbari", swaras: "S r g m P d n",  notes: [0, 1, 3, 5, 7, 8, 10], vadi: 1 },
    };

    // One bol per matra (synthetic tabla POC). '|' = vibhag in display only.
    const TAALS = {
      teentaal: {
        name: "Teentaal",
        matras: 16,
        vibhag: "4+4+4+4",
        display: "Dha Dhin Dhin Dha | Dha Dhin Dhin Dha | Ta Tin Tin Ta | Dha Dhin Dhin Dha",
        bols: ["dha","dhin","dhin","dha","dha","dhin","dhin","dha","ta","tin","tin","ta","dha","dhin","dhin","dha"],
        light: [8, 9, 10, 11],
      },
      ektaal: {
        name: "Ektaal",
        matras: 12,
        vibhag: "2+2+2+2+2+2",
        display: "Dhin Dhin | Dha Ge | Dhin Dhin | Dha Ge | Tin Na | Kat Ta",
        bols: ["dhin","dhin","dha","ge","dhin","dhin","dha","ge","tin","na","kat","ta"],
        light: [8, 9, 10, 11],
      },
      jhaptal: {
        name: "Jhaptal",
        matras: 10,
        vibhag: "2+3+2+3",
        display: "Dhi Na | Dhi Dhi Na | Ti Na | Dhi Dhi Na",
        bols: ["dhi","na","dhi","dhi","na","ti","na","dhi","dhi","na"],
        light: [5, 6],
      },
      rupak: {
        name: "Rupak",
        matras: 7,
        vibhag: "3+2+2",
        display: "Tin Tin Na | Dhin Na | Dhin Na",
        bols: ["tin","tin","na","dhin","na","dhin","na"],
        light: [0, 1],
      },
      dadra: {
        name: "Dadra",
        matras: 6,
        vibhag: "3+3",
        display: "Dha Dhin Na | Dha Tin Na",
        bols: ["dha","dhin","na","dha","tin","na"],
        light: [2, 5],
      },
      keherwa: {
        name: "Keherwa",
        matras: 8,
        vibhag: "4+4",
        display: "Dha Ge Na Tin | Na Ka Dhin Na",
        bols: ["dha","ge","na","tin","na","ka","dhin","na"],
        light: [1, 4, 5],
      },
      deepchandi: {
        name: "Deepchandi",
        matras: 14,
        vibhag: "3+4+3+4",
        display: "Dha Dha Dhin Ta | Ke Na Ti Dha Dhin Ta | Dha Dha Dhin Ta | Ke Na Ti Dha Dhin Ta",
        bols: ["dha","dha","dhin","ta","ke","na","ti","dha","dhin","ta","dha","dha","dhin","ta"],
        light: [4, 5, 6, 7],
      },
    };

    const ROOTS = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
    const NOTE_NAMES = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];

    let droneSynth, loopSynth, reverb, droneGain, loopGain, tablaGain;
    let bayan, dayan, tik;
    let tablaSeq = null;
    let loopInterval = null;
    let running = false;
    let audioReady = false;
    let matraIdx = 0;

    const ragaEl = document.getElementById("raga");
    const rootEl = document.getElementById("root");
    const taalEl = document.getElementById("taal");
    const swaraLine = document.getElementById("swara-line");
    const taalLine = document.getElementById("taal-line");
    const statusEl = document.getElementById("status");

    Object.entries(RAGAS).forEach(([id, r]) => ragaEl.append(new Option(r.name, id)));
    ROOTS.forEach((n) => rootEl.append(new Option(n, n)));
    Object.entries(TAALS).forEach(([id, t]) => taalEl.append(new Option(`${t.name} (${t.matras})`, id)));

    function rootMidi() {
      return 48 + ROOTS.indexOf(rootEl.value);
    }

    function noteName(semitoneFromSa) {
      const m = rootMidi() + semitoneFromSa;
      const oct = Math.floor(m / 12) - 1;
      return NOTE_NAMES[m % 12] + oct;
    }

    function currentTaal() {
      return TAALS[taalEl.value];
    }

    function updateLines() {
      const r = RAGAS[ragaEl.value];
      const t = currentTaal();
      swaraLine.textContent = r.swaras + " · harmonium loop in scale";
      taalLine.textContent = `${t.matras} matras (${t.vibhag}) · ${t.display}`;
    }
    ragaEl.onchange = updateLines;
    taalEl.onchange = () => {
      updateLines();
      if (running) rebuildTablaSeq();
    };
    updateLines();

    function pickLoopNote() {
      const r = RAGAS[ragaEl.value];
      const notes = r.notes;
      const roll = Math.random();
      let sem;
      if (roll < 0.2) sem = 0;
      else if (roll < 0.35 && r.vadi != null) sem = r.vadi;
      else sem = notes[Math.floor(Math.random() * notes.length)];
      const octave = Math.random() < 0.25 ? 12 : 0;
      return noteName(sem + octave);
    }

    function playBol(bol, time, matraIndex) {
      const t = currentTaal();
      const lightSet = new Set(t.light || []);
      const isLight = lightSet.has(matraIndex);
      const isSam = matraIndex === 0;
      let vel = isSam ? 0.95 : isLight ? 0.42 : 0.72;

      switch (bol) {
        case "dha":
          bayan.triggerAttackRelease("C1", "16n", time, vel);
          break;
        case "dhin":
        case "dhi":
          bayan.triggerAttackRelease("D1", "16n", time, vel * 0.85);
          dayan.triggerAttackRelease("A4", "32n", time, vel * 0.35);
          break;
        case "ge":
        case "ka":
          bayan.triggerAttackRelease("G1", "32n", time, vel * 0.5);
          break;
        case "ta":
        case "tin":
        case "ti":
        case "tun":
          tik.triggerAttackRelease("16n", time, vel * (bol === "tin" ? 0.55 : 0.65));
          dayan.triggerAttackRelease("C5", "32n", time, vel * 0.3);
          break;
        case "na":
          dayan.triggerAttackRelease("G4", "16n", time, vel * 0.55);
          break;
        case "kat":
          tik.triggerAttackRelease("32n", time, vel * 0.5);
          break;
        case "ke":
          bayan.triggerAttackRelease("F1", "32n", time, vel * 0.45);
          break;
        default:
          break;
      }
    }

    /** Reed-style harmonium: detuned saws, AM, vibrato, chorus, mellow filter. */
    function makeHarmonium(dest, { drone = false } = {}) {
      const vib = new Tone.Vibrato({ frequency: 5.5, depth: 0.14, wet: 0.4 });
      const chorus = new Tone.Chorus({ frequency: 1.2, delayTime: 4, depth: 0.45, wet: 0.35 }).start();
      const filt = new Tone.Filter({
        frequency: drone ? 1100 : 1600,
        type: "lowpass",
        rolloff: -24,
        Q: drone ? 1.8 : 2.4,
      });
      const trem = new Tone.Tremolo({
        frequency: drone ? 3.2 : 4.5,
        depth: drone ? 0.06 : 0.04,
        wet: drone ? 0.2 : 0.12,
      }).start();

      const synth = new Tone.PolySynth(Tone.AMSynth, {
        harmonicity: drone ? 1.6 : 2,
        oscillator: { type: "sawtooth" },
        envelope: drone
          ? { attack: 1.4, decay: 0.4, sustain: 0.9, release: 3.2 }
          : { attack: 0.06, decay: 0.22, sustain: 0.65, release: 1.1 },
        modulation: { type: "sine" },
        modulationEnvelope: {
          attack: 0.04,
          decay: 0.15,
          sustain: drone ? 0.45 : 0.3,
          release: 0.7,
        },
        volume: drone ? -14 : -11,
      });

      synth.chain(vib, chorus, filt, trem, dest);
      return synth;
    }

    async function ensureAudio() {
      await Tone.start();
      if (audioReady) return;

      reverb = new Tone.Reverb({ decay: 9, wet: 0.38 }).toDestination();
      await reverb.generate();

      droneGain = new Tone.Gain(0).connect(reverb);
      loopGain = new Tone.Gain(0).connect(reverb);
      tablaGain = new Tone.Gain(0).connect(reverb);

      droneSynth = makeHarmonium(droneGain, { drone: true });
      loopSynth = makeHarmonium(loopGain, { drone: false });

      bayan = new Tone.MembraneSynth({
        pitchDecay: 0.008,
        octaves: 5,
        oscillator: { type: "sine" },
        envelope: { attack: 0.001, decay: 0.35, sustain: 0, release: 0.15 },
      }).connect(tablaGain);

      dayan = new Tone.MetalSynth({
        frequency: 280,
        envelope: { attack: 0.001, decay: 0.08, release: 0.01 },
        harmonicity: 4.5,
        modulationIndex: 20,
        resonance: 5000,
        octaves: 1.2,
        volume: -14,
      }).connect(tablaGain);

      tik = new Tone.NoiseSynth({
        noise: { type: "white" },
        envelope: { attack: 0.001, decay: 0.04, sustain: 0 },
      }).connect(tablaGain);

      audioReady = true;
    }

    function setTransportBpm() {
      Tone.Transport.bpm.value = +document.getElementById("tempo").value;
    }

    function rebuildTablaSeq() {
      if (tablaSeq) {
        tablaSeq.stop();
        tablaSeq.dispose();
        tablaSeq = null;
      }
      if (!tablaEnabled() || !running) return;

      const t = currentTaal();
      matraIdx = 0;
      tablaSeq = new Tone.Sequence(
        (time, bol) => {
          const i = matraIdx % t.matras;
          playBol(bol, time, i);
          matraIdx++;
        },
        t.bols,
        "4n"
      );
      tablaSeq.loop = true;
      tablaSeq.humanize = false;
      tablaSeq.start(0);
    }

    function ragaEnabled() {
      return document.getElementById("ragaOn").checked;
    }

    function tablaEnabled() {
      return document.getElementById("tablaOn").checked;
    }

    function stopRaga() {
      clearInterval(loopInterval);
      loopInterval = null;
      if (droneSynth) droneSynth.releaseAll();
      if (loopSynth) loopSynth.releaseAll();
    }

    function startDrone() {
      if (!ragaEnabled() || !droneSynth) return;
      const sa = noteName(0);
      const pa = noteName(7);
      const saLow = noteName(-12);
      droneSynth.releaseAll();
      droneSynth.triggerAttack([saLow, sa, pa], Tone.now());
    }

    function scheduleLoop() {
      clearInterval(loopInterval);
      loopInterval = null;
      if (!ragaEnabled() || !running) return;
      const bpm = +document.getElementById("tempo").value;
      const density = +document.getElementById("density").value;
      const ms = (60 / bpm) * 1000 * (6 - density) * 0.5;
      loopInterval = setInterval(() => {
        if (!running || !ragaEnabled()) return;
        loopSynth.triggerAttackRelease(pickLoopNote(), "8n", Tone.now(), 0.35 + Math.random() * 0.25);
      }, Math.max(180, ms));
    }

    function playbackLabel() {
      const parts = [];
      if (ragaEnabled()) parts.push(RAGAS[ragaEl.value].name);
      if (tablaEnabled()) parts.push(currentTaal().name);
      return parts.length ? parts.join(" · ") : "nothing enabled";
    }

    function setVolumes() {
      if (!droneGain) return;
      const raga = ragaEnabled();
      droneGain.gain.rampTo(raga ? +document.getElementById("droneVol").value / 100 * 0.45 : 0, 0.2);
      loopGain.gain.rampTo(raga ? +document.getElementById("loopVol").value / 100 * 0.5 : 0, 0.2);
      tablaGain.gain.rampTo(
        tablaEnabled() ? +document.getElementById("tablaVol").value / 100 * 0.85 : 0,
        0.2
      );
    }

    ["droneVol", "loopVol", "density", "tablaVol"].forEach((id) => {
      document.getElementById(id).oninput = setVolumes;
    });
    document.getElementById("ragaOn").onchange = () => {
      setVolumes();
      if (!running) return;
      if (ragaEnabled()) {
        startDrone();
        scheduleLoop();
      } else {
        stopRaga();
      }
      statusEl.textContent = "Playing — " + playbackLabel();
    };
    document.getElementById("tablaOn").onchange = () => {
      setVolumes();
      if (running) rebuildTablaSeq();
      if (running) statusEl.textContent = "Playing — " + playbackLabel();
    };
    document.getElementById("tempo").onchange = () => {
      setTransportBpm();
      if (running) scheduleLoop();
    };

    document.getElementById("start").onclick = async () => {
      const startBtn = document.getElementById("start");
      if (!ragaEnabled() && !tablaEnabled()) {
        statusEl.textContent = "Enable Raga and/or Tabla, then press Start.";
        return;
      }
      try {
        startBtn.disabled = true;
        statusEl.textContent = "Starting audio…";
        await ensureAudio();
        running = true;
        setTransportBpm();
        setVolumes();
        if (ragaEnabled()) {
          startDrone();
          scheduleLoop();
        }

        Tone.Transport.stop();
        Tone.Transport.position = 0;
        if (tablaEnabled() || ragaEnabled()) Tone.Transport.start();
        rebuildTablaSeq();

        document.getElementById("stop").disabled = false;
        statusEl.textContent = "Playing — " + playbackLabel();
        statusEl.classList.add("on");
      } catch (err) {
        console.error(err);
        running = false;
        startBtn.disabled = false;
        statusEl.textContent = "Could not start audio — try again or refresh.";
        statusEl.classList.remove("on");
      }
    };

    document.getElementById("stop").onclick = () => {
      running = false;
      clearInterval(loopInterval);
      if (tablaSeq) {
        tablaSeq.stop();
        tablaSeq.dispose();
        tablaSeq = null;
      }
      Tone.Transport.stop();
      if (droneSynth) droneSynth.releaseAll();
      if (loopSynth) loopSynth.releaseAll();
      document.getElementById("start").disabled = false;
      document.getElementById("stop").disabled = true;
      statusEl.textContent = "Stopped";
      statusEl.classList.remove("on");
    };

    ragaEl.onchange = () => {
      updateLines();
      if (running && ragaEnabled()) startDrone();
      if (running) statusEl.textContent = "Playing — " + playbackLabel();
    };
    rootEl.onchange = () => {
      if (running && ragaEnabled()) startDrone();
    };
  </script>
</body>
</html>
