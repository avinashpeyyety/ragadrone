<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Raga Drone — POC</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <style>
    :root {
      --bg: #0a0b12;
      --panel: #12141f;
      --gold: #d4a853;
      --saffron: #e8a838;
      --text: #e8e6e3;
      --muted: #9a958c;
      --border: rgba(212, 168, 83, 0.25);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: radial-gradient(ellipse 120% 80% at 50% -20%, #1a1530 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1.25rem 3rem;
    }
    .wrap { max-width: 820px; margin: 0 auto; }
    h1 { font-size: 1.35rem; color: var(--gold); margin-bottom: 0.25rem; }
    .sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.5rem; }
    label { display: block; font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.35rem; }
    select, input[type="range"] { width: 100%; margin-bottom: 1rem; }
    .columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1rem;
      align-items: start;
    }
    .columns .panel { margin-bottom: 0; min-height: 100%; }
    .hidden { display: none !important; }
    @media (max-width: 680px) {
      .columns { grid-template-columns: 1fr; }
    }
    select {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.6rem 0.75rem;
      border-radius: 8px;
      font-size: 1rem;
    }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    .panel h2 {
      font-size: 0.75rem;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.75rem;
    }
    .check { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; }
    .check input { width: auto; margin: 0; }
    .check span { font-size: 0.9rem; color: var(--text); text-transform: none; letter-spacing: 0; }
    .btn {
      width: 100%;
      padding: 0.85rem;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      background: linear-gradient(135deg, var(--saffron), var(--gold));
      color: #1a1208;
    }
    .btn.stop { background: var(--panel); color: var(--gold); border: 1px solid var(--border); margin-top: 0.5rem; }
    .btn:disabled { opacity: 0.4; cursor: default; }
    .status { font-size: 0.85rem; color: var(--muted); margin-top: 1rem; text-align: center; }
    .status.on { color: var(--saffron); }
    .swaras, .taal-line { font-size: 0.8rem; color: var(--muted); margin-top: 0.5rem; line-height: 1.4; }
    .taal-line { font-family: ui-monospace, monospace; font-size: 0.72rem; word-break: break-word; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Raga Drone</h1>
    <p class="sub">POC — harmonium-style drone, scale loop, tabla taal</p>

    <div class="panel">
      <h2>Session</h2>
      <div class="row">
        <div>
          <label for="root">Root (Sa)</label>
          <select id="root"></select>
        </div>
        <div>
          <label for="sessionTempo">Tempo (BPM)</label>
          <select id="sessionTempo">
            <option value="50">50</option>
            <option value="60" selected>60</option>
            <option value="72">72</option>
            <option value="90">90</option>
            <option value="110">110</option>
            <option value="120">120</option>
          </select>
        </div>
      </div>
      <label class="check">
        <input type="checkbox" id="unlinkTablaTempo" />
        <span>Separate tabla tempo</span>
      </label>
      <div id="tablaTempoRow" class="hidden">
        <label for="tablaTempo">Tabla tempo (BPM)</label>
        <select id="tablaTempo">
          <option value="50">50</option>
          <option value="60" selected>60</option>
          <option value="72">72</option>
          <option value="90">90</option>
          <option value="110">110</option>
          <option value="120">120</option>
        </select>
      </div>
      <label class="check">
        <input type="checkbox" id="droneOn" checked />
        <span>Drone on (harmonium Sa + Pa)</span>
      </label>
      <label for="droneVol">Drone level</label>
      <input type="range" id="droneVol" min="0" max="100" value="70" />
    </div>

    <div class="columns">
      <div class="panel">
        <h2>Raga</h2>
        <label class="check">
          <input type="checkbox" id="ragaOn" checked />
          <span>Loop on</span>
        </label>
        <label for="raga">Raga</label>
        <select id="raga"></select>
        <p class="swaras" id="swara-line"></p>
        <label for="loopVol">Loop level</label>
        <input type="range" id="loopVol" min="0" max="100" value="50" />
        <label for="density">Loop density</label>
        <input type="range" id="density" min="1" max="5" value="3" />
        <p class="swaras" id="density-hint">Sparse at 1 · busier at 5 · biased to vadi/samvadi</p>
      </div>

      <div class="panel">
        <h2>Tabla · Taal</h2>
        <label class="check">
          <input type="checkbox" id="tablaOn" checked />
          <span>Tabla on</span>
        </label>
        <label for="taal">Taal</label>
        <select id="taal"></select>
        <p class="taal-line" id="taal-line"></p>
        <label for="tablaVol">Tabla level</label>
        <input type="range" id="tablaVol" min="0" max="100" value="70" />
      </div>
    </div>

    <button class="btn" id="start">Start</button>
    <button class="btn stop" id="stop" disabled>Stop</button>
    <p class="status" id="status">Click Start (audio needs a tap/click)</p>
  </div>

  <script>
    // shruti: semitone index → cents offset from 12-TET (komal ~−48, tivra Ma ~+55)
    const TIMBRE = {
      bright: {
        droneFilter: 1280, loopFilter: 1950, harmonicityDr: 1.65, harmonicityLp: 2.15,
        chorusWet: 0.28, vibDepth: 0.1, loopAttack: 0.05, loopRelease: 1.15, loopVel: 0.52, sparseOct: 0.22,
      },
      mellow: {
        droneFilter: 1150, loopFilter: 1550, harmonicityDr: 1.55, harmonicityLp: 1.9,
        chorusWet: 0.24, vibDepth: 0.09, loopAttack: 0.08, loopRelease: 1.35, loopVel: 0.48, sparseOct: 0.16,
      },
      dark: {
        droneFilter: 920, loopFilter: 1100, harmonicityDr: 1.35, harmonicityLp: 1.65,
        chorusWet: 0.16, vibDepth: 0.07, loopAttack: 0.14, loopRelease: 1.75, loopVel: 0.42, sparseOct: 0.08,
      },
    };

    const RAGAS = {
      yaman: {
        name: "Yaman", swaras: "S R G M♯ P D N", notes: [0, 2, 4, 6, 7, 9, 11],
        vadi: 4, samvadi: 11, timbre: "bright", shruti: { 6: 55 },
      },
      bhairav: {
        name: "Bhairav", swaras: "S r G m P d N", notes: [0, 1, 4, 5, 7, 8, 11],
        vadi: 1, samvadi: 7, timbre: "dark", shruti: { 1: -48, 5: -42, 8: -48 },
      },
      malkauns: {
        name: "Malkauns", swaras: "S g m d S", notes: [0, 3, 5, 8],
        vadi: 5, samvadi: 0, timbre: "dark", shruti: { 3: -48, 5: -42, 8: -48 },
      },
      kafi: {
        name: "Kafi", swaras: "S R g M P D n", notes: [0, 2, 3, 5, 7, 9, 10],
        vadi: 9, samvadi: 5, timbre: "mellow", shruti: { 3: -48, 10: -48 },
      },
      darbari: {
        name: "Darbari", swaras: "S r g m P d n", notes: [0, 1, 3, 5, 7, 8, 10],
        vadi: 1, samvadi: 5, timbre: "dark", shruti: { 1: -48, 3: -48, 5: -42, 8: -48, 10: -48 },
      },
    };

    // One bol per matra (synthetic tabla POC). '|' = vibhag in display only.
    const TAALS = {
      teentaal: {
        name: "Teentaal",
        matras: 16,
        vibhag: "4+4+4+4",
        display: "Dha Dhin Dhin Dha | Dha Dhin Dhin Dha | Ta Tin Tin Ta | Dha Dhin Dhin Dha",
        bols: ["dha","dhin","dhin","dha","dha","dhin","dhin","dha","ta","tin","tin","ta","dha","dhin","dhin","dha"],
        light: [8, 9, 10, 11],
      },
      ektaal: {
        name: "Ektaal",
        matras: 12,
        vibhag: "2+2+2+2+2+2",
        display: "Dhin Dhin | Dha Ge | Dhin Dhin | Dha Ge | Tin Na | Kat Ta",
        bols: ["dhin","dhin","dha","ge","dhin","dhin","dha","ge","tin","na","kat","ta"],
        light: [8, 9, 10, 11],
      },
      jhaptal: {
        name: "Jhaptal",
        matras: 10,
        vibhag: "2+3+2+3",
        display: "Dhi Na | Dhi Dhi Na | Ti Na | Dhi Dhi Na",
        bols: ["dhi","na","dhi","dhi","na","ti","na","dhi","dhi","na"],
        light: [5, 6],
      },
      rupak: {
        name: "Rupak",
        matras: 7,
        vibhag: "3+2+2",
        display: "Tin Tin Na | Dhin Na | Dhin Na",
        bols: ["tin","tin","na","dhin","na","dhin","na"],
        light: [0, 1],
      },
      dadra: {
        name: "Dadra",
        matras: 6,
        vibhag: "3+3",
        display: "Dha Dhin Na | Dha Tin Na",
        bols: ["dha","dhin","na","dha","tin","na"],
        light: [2, 5],
      },
      keherwa: {
        name: "Keherwa",
        matras: 8,
        vibhag: "4+4",
        display: "Dha Ge Na Tin | Na Ka Dhin Na",
        bols: ["dha","ge","na","tin","na","ka","dhin","na"],
        light: [1, 4, 5],
      },
      deepchandi: {
        name: "Deepchandi",
        matras: 14,
        vibhag: "3+4+3+4",
        display: "Dha Dha Dhin Ta | Ke Na Ti Dha Dhin Ta | Dha Dha Dhin Ta | Ke Na Ti Dha Dhin Ta",
        bols: ["dha","dha","dhin","ta","ke","na","ti","dha","dhin","ta","dha","dha","dhin","ta"],
        light: [4, 5, 6, 7],
      },
    };

    const ROOTS = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
    const NOTE_NAMES = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
    const SWARA_LABEL = ["Sa", "r", "R", "g", "G", "m", "M♯", "P", "d", "D", "n", "N"];

    function swaraLabel(semitone) {
      return SWARA_LABEL[((semitone % 12) + 12) % 12];
    }

    let droneSynth, loopSynth, droneChain, loopChain, reverb, droneGain, loopGain, tablaGain;
    let bayan, dayan, tik;
    let tablaSeq = null;
    let loopInterval = null;
    let running = false;
    let audioReady = false;
    let matraIdx = 0;

    const ragaEl = document.getElementById("raga");
    const rootEl = document.getElementById("root");
    const taalEl = document.getElementById("taal");
    const swaraLine = document.getElementById("swara-line");
    const taalLine = document.getElementById("taal-line");
    const statusEl = document.getElementById("status");

    Object.entries(RAGAS).forEach(([id, r]) => ragaEl.append(new Option(r.name, id)));
    ROOTS.forEach((n) => rootEl.append(new Option(n, n)));
    Object.entries(TAALS).forEach(([id, t]) => taalEl.append(new Option(`${t.name} (${t.matras})`, id)));

    function rootMidi() {
      return 48 + ROOTS.indexOf(rootEl.value);
    }

    function currentRaga() {
      return RAGAS[ragaEl.value];
    }

    function currentTimbre() {
      return TIMBRE[currentRaga().timbre] || TIMBRE.mellow;
    }

    /** Frequency in Hz with optional shruti (cents) per swara. */
    function noteFreq(semitoneFromSa, octaveAdd = 0) {
      const r = currentRaga();
      const midi = rootMidi() + semitoneFromSa + octaveAdd;
      const cents = (r.shruti && r.shruti[semitoneFromSa]) || 0;
      return Tone.Frequency(midi, "midi").transpose(cents).toFrequency();
    }

    function currentTaal() {
      return TAALS[taalEl.value];
    }

    function updateLines() {
      const r = currentRaga();
      const t = currentTaal();
      swaraLine.textContent = `${r.swaras} · shruti tuning · ${r.timbre} harmonium`;
      taalLine.textContent = `${t.matras} matras (${t.vibhag}) · ${t.display}`;
    }
    ragaEl.onchange = () => {
      updateLines();
      applyRagaTimbre();
      if (running) syncDrone();
      if (running) statusEl.textContent = "Playing — " + playbackLabel();
    };
    taalEl.onchange = () => {
      updateLines();
      if (running) rebuildTablaSeq();
    };
    updateLines();

    function pickLoopNote() {
      const r = currentRaga();
      const t = currentTimbre();
      const notes = r.notes;
      const roll = Math.random();
      let sem;
      if (roll < 0.26) sem = 0;
      else if (roll < 0.48) sem = r.vadi;
      else if (roll < 0.62) sem = r.samvadi;
      else sem = notes[Math.floor(Math.random() * notes.length)];
      const octave = Math.random() < t.sparseOct ? 12 : 0;
      return { freq: noteFreq(sem, octave), vel: t.loopVel * (0.85 + Math.random() * 0.2) };
    }

    function playBol(bol, time, matraIndex) {
      const t = currentTaal();
      const lightSet = new Set(t.light || []);
      const isLight = lightSet.has(matraIndex);
      const isSam = matraIndex === 0;
      let vel = isSam ? 0.95 : isLight ? 0.42 : 0.72;

      switch (bol) {
        case "dha":
          bayan.triggerAttackRelease("C1", "16n", time, vel);
          break;
        case "dhin":
        case "dhi":
          bayan.triggerAttackRelease("D1", "16n", time, vel * 0.85);
          dayan.triggerAttackRelease("A4", "32n", time, vel * 0.35);
          break;
        case "ge":
        case "ka":
          bayan.triggerAttackRelease("G1", "32n", time, vel * 0.5);
          break;
        case "ta":
        case "tin":
        case "ti":
        case "tun":
          tik.triggerAttackRelease("16n", time, vel * (bol === "tin" ? 0.55 : 0.65));
          dayan.triggerAttackRelease("C5", "32n", time, vel * 0.3);
          break;
        case "na":
          dayan.triggerAttackRelease("G4", "16n", time, vel * 0.55);
          break;
        case "kat":
          tik.triggerAttackRelease("32n", time, vel * 0.5);
          break;
        case "ke":
          bayan.triggerAttackRelease("F1", "32n", time, vel * 0.45);
          break;
        default:
          break;
      }
    }

    /** Reed-style harmonium: detuned saws, AM, vibrato, chorus, mellow filter. */
    function makeHarmonium(dest, { drone = false } = {}) {
      const preset = currentTimbre();
      const vib = new Tone.Vibrato({ frequency: 5.2, depth: preset.vibDepth, wet: 0.22 });
      const chorus = new Tone.Chorus({ frequency: 1.1, delayTime: 4.2, depth: 0.35, wet: preset.chorusWet }).start();
      const filt = new Tone.Filter({
        frequency: drone ? preset.droneFilter : preset.loopFilter,
        type: "lowpass",
        rolloff: -24,
        Q: drone ? 1.7 : 2.2,
      });
      const trem = new Tone.Tremolo({
        frequency: drone ? 3 : 4.2,
        depth: drone ? 0.05 : 0.035,
        wet: drone ? 0.18 : 0.1,
      }).start();

      const synth = new Tone.PolySynth(Tone.AMSynth, {
        harmonicity: drone ? preset.harmonicityDr : preset.harmonicityLp,
        oscillator: { type: "sawtooth" },
        envelope: drone
          ? { attack: 1.5, decay: 0.38, sustain: 0.92, release: 3.4 }
          : { attack: preset.loopAttack, decay: 0.2, sustain: 0.6, release: preset.loopRelease },
        modulation: { type: "sine" },
        modulationEnvelope: {
          attack: 0.04,
          decay: 0.14,
          sustain: drone ? 0.42 : 0.28,
          release: 0.65,
        },
        volume: drone ? -6 : -4,
      });

      synth.chain(vib, chorus, filt, trem, dest);
      return { synth, filter: filt, vib, chorus, trem, drone };
    }

    function applyRagaTimbre() {
      if (!loopChain || !droneChain) return;
      const p = currentTimbre();
      const ramp = 0.4;
      droneChain.filter.frequency.rampTo(p.droneFilter, ramp);
      loopChain.filter.frequency.rampTo(p.loopFilter, ramp);
      loopChain.vib.depth = p.vibDepth;
      loopChain.chorus.wet.value = p.chorusWet;
      droneChain.synth.set({ harmonicity: p.harmonicityDr });
      loopChain.synth.set({
        harmonicity: p.harmonicityLp,
        envelope: {
          attack: p.loopAttack,
          decay: 0.2,
          sustain: 0.6,
          release: p.loopRelease,
        },
      });
    }

    async function ensureAudio() {
      await Tone.start();
      if (audioReady) return;

      const master = new Tone.Gain(1).toDestination();
      reverb = new Tone.Reverb({ decay: 7, wet: 0.22 });
      await reverb.generate();
      reverb.connect(master);

      droneGain = new Tone.Gain(0).connect(reverb);
      loopGain = new Tone.Gain(0).connect(reverb);
      tablaGain = new Tone.Gain(0).connect(reverb);

      droneChain = makeHarmonium(droneGain, { drone: true });
      loopChain = makeHarmonium(loopGain, { drone: false });
      droneSynth = droneChain.synth;
      loopSynth = loopChain.synth;
      applyRagaTimbre();

      bayan = new Tone.MembraneSynth({
        pitchDecay: 0.008,
        octaves: 5,
        oscillator: { type: "sine" },
        envelope: { attack: 0.001, decay: 0.35, sustain: 0, release: 0.15 },
      }).connect(tablaGain);

      dayan = new Tone.MetalSynth({
        frequency: 280,
        envelope: { attack: 0.001, decay: 0.08, release: 0.01 },
        harmonicity: 4.5,
        modulationIndex: 20,
        resonance: 5000,
        octaves: 1.2,
        volume: -14,
      }).connect(tablaGain);

      tik = new Tone.NoiseSynth({
        noise: { type: "white" },
        envelope: { attack: 0.001, decay: 0.04, sustain: 0 },
      }).connect(tablaGain);

      audioReady = true;
    }

    function sessionBpm() {
      return +document.getElementById("sessionTempo").value;
    }

    function tablaBpm() {
      if (document.getElementById("unlinkTablaTempo").checked) {
        return +document.getElementById("tablaTempo").value;
      }
      return sessionBpm();
    }

    function setTablaTransportBpm() {
      Tone.Transport.bpm.value = tablaBpm();
    }

    function updateTablaTempoRow() {
      const unlink = document.getElementById("unlinkTablaTempo").checked;
      document.getElementById("tablaTempoRow").classList.toggle("hidden", !unlink);
    }
    document.getElementById("unlinkTablaTempo").onchange = () => {
      updateTablaTempoRow();
      setTablaTransportBpm();
      if (running) rebuildTablaSeq();
    };
    document.getElementById("sessionTempo").onchange = () => {
      setTablaTransportBpm();
      if (running) scheduleLoop();
    };
    document.getElementById("tablaTempo").onchange = () => {
      setTablaTransportBpm();
      if (running) rebuildTablaSeq();
    };
    updateTablaTempoRow();

    function shouldDrone() {
      return document.getElementById("droneOn").checked;
    }

    function droneGainLevel() {
      return (+document.getElementById("droneVol").value / 100) * 0.85;
    }

    function rebuildTablaSeq() {
      if (tablaSeq) {
        tablaSeq.stop();
        tablaSeq.dispose();
        tablaSeq = null;
      }
      if (!tablaEnabled() || !running) return;

      const t = currentTaal();
      matraIdx = 0;
      tablaSeq = new Tone.Sequence(
        (time, bol) => {
          const i = matraIdx % t.matras;
          playBol(bol, time, i);
          matraIdx++;
        },
        t.bols,
        "4n"
      );
      tablaSeq.loop = true;
      tablaSeq.humanize = false;
      tablaSeq.start(0);
    }

    function ragaEnabled() {
      return document.getElementById("ragaOn").checked;
    }

    function tablaEnabled() {
      return document.getElementById("tablaOn").checked;
    }

    function stopRaga() {
      clearInterval(loopInterval);
      loopInterval = null;
      if (loopSynth) loopSynth.releaseAll();
    }

    function stopDrone() {
      if (droneSynth) droneSynth.releaseAll();
    }

    function syncDrone() {
      if (!droneSynth || !running) return;
      if (shouldDrone()) {
        droneSynth.releaseAll();
        droneSynth.triggerAttack(
          [noteFreq(0, -12), noteFreq(0, 0), noteFreq(7, 0)],
          Tone.now(),
          0.92
        );
      } else {
        stopDrone();
      }
    }

    function scheduleLoop() {
      clearInterval(loopInterval);
      loopInterval = null;
      if (!ragaEnabled() || !running) return;
      const bpm = sessionBpm();
      const density = +document.getElementById("density").value;
      const t = currentTimbre();
      const ms = (60 / bpm) * 1000 * (6.5 - density) * 0.55;
      loopInterval = setInterval(() => {
        if (!running || !ragaEnabled()) return;
        const n = pickLoopNote();
        loopSynth.triggerAttackRelease(n.freq, "8n", Tone.now(), n.vel);
      }, Math.max(220, ms * (t.sparseOct < 0.12 ? 1.35 : 1)));
    }

    function playbackLabel() {
      const parts = [];
      if (shouldDrone()) parts.push("drone");
      if (ragaEnabled()) {
        const r = currentRaga();
        parts.push(
          `${r.name} (${r.timbre}, vadi ${swaraLabel(r.vadi)}, samvadi ${swaraLabel(r.samvadi)})`
        );
      }
      if (tablaEnabled()) parts.push(currentTaal().name);
      return parts.length ? parts.join(" · ") : "nothing enabled";
    }

    function setVolumes() {
      if (!droneGain) return;
      droneGain.gain.rampTo(shouldDrone() ? droneGainLevel() : 0, 0.2);
      loopGain.gain.rampTo(ragaEnabled() ? +document.getElementById("loopVol").value / 100 * 0.8 : 0, 0.2);
      tablaGain.gain.rampTo(
        tablaEnabled() ? +document.getElementById("tablaVol").value / 100 * 0.9 : 0,
        0.2
      );
    }

    function onMixChange() {
      setVolumes();
      if (!running) return;
      syncDrone();
      if (ragaEnabled()) scheduleLoop();
      else stopRaga();
      if (tablaEnabled()) rebuildTablaSeq();
      else if (tablaSeq) {
        tablaSeq.stop();
        tablaSeq.dispose();
        tablaSeq = null;
      }
      statusEl.textContent = "Playing — " + playbackLabel();
    }

    ["droneVol", "loopVol", "density", "tablaVol"].forEach((id) => {
      document.getElementById(id).oninput = () => {
        setVolumes();
        if (!running) return;
        if (id === "droneVol") syncDrone();
        if (id === "density" && ragaEnabled()) scheduleLoop();
      };
    });
    ["ragaOn", "tablaOn", "droneOn"].forEach((id) => {
      document.getElementById(id).onchange = onMixChange;
    });
    document.getElementById("start").onclick = async () => {
      const startBtn = document.getElementById("start");
      if (!ragaEnabled() && !tablaEnabled() && !shouldDrone()) {
        statusEl.textContent = "Enable loop, tabla, and/or drone, then press Start.";
        return;
      }
      try {
        startBtn.disabled = true;
        statusEl.textContent = "Starting audio…";
        await ensureAudio();
        running = true;
        setTablaTransportBpm();
        setVolumes();
        if (ragaEnabled()) scheduleLoop();
        syncDrone();

        Tone.Transport.stop();
        Tone.Transport.position = 0;
        if (tablaEnabled()) Tone.Transport.start();
        rebuildTablaSeq();

        document.getElementById("stop").disabled = false;
        statusEl.textContent = "Playing — " + playbackLabel();
        statusEl.classList.add("on");
      } catch (err) {
        console.error(err);
        running = false;
        startBtn.disabled = false;
        statusEl.textContent = "Could not start audio — try again or refresh.";
        statusEl.classList.remove("on");
      }
    };

    document.getElementById("stop").onclick = () => {
      running = false;
      clearInterval(loopInterval);
      if (tablaSeq) {
        tablaSeq.stop();
        tablaSeq.dispose();
        tablaSeq = null;
      }
      Tone.Transport.stop();
      if (droneSynth) droneSynth.releaseAll();
      if (loopSynth) loopSynth.releaseAll();
      document.getElementById("start").disabled = false;
      document.getElementById("stop").disabled = true;
      statusEl.textContent = "Stopped";
      statusEl.classList.remove("on");
    };

    rootEl.onchange = () => {
      if (running) {
        syncDrone();
        if (ragaEnabled()) scheduleLoop();
      }
    };
  </script>
</body>
</html>
